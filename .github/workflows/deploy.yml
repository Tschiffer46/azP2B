# Required GitHub Secrets:
#   HETZNER_HOST      - IP address or hostname of the Hetzner server
#   HETZNER_USER      - SSH username
#   HETZNER_SSH_KEY   - Private SSH key content
#   GHCR_TOKEN        - GitHub Personal Access Token with packages:write
#   DB_PASSWORD       - MariaDB user password
#   DB_ROOT_PASSWORD  - MariaDB root password
#   ADMIN_PASSWORD    - Admin dashboard password

name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/tschiffer46/azp2b:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "cd ~/p2b && \
             docker compose pull && \
             docker compose up -d && \
             docker compose exec -T app npx prisma migrate deploy"

# Required GitHub Secrets:
#   HETZNER_HOST      - IP or hostname of the Hetzner server
#   HETZNER_USER      - SSH username (deploy)
#   HETZNER_SSH_KEY   - Private SSH key for the deploy user
#   DB_PASSWORD       - MariaDB user password
#   DB_ROOT_PASSWORD  - MariaDB root password
#   ADMIN_PASSWORD    - Admin dashboard password
#   SMTP_HOST         - SMTP server hostname (optional — leave empty to disable email)
#   SMTP_PORT         - SMTP port, e.g. 587 (optional)
#   SMTP_USER         - SMTP login username (optional)
#   SMTP_PASS         - SMTP login password (optional)
#   SMTP_FROM         - From address, e.g. info@padeltobusiness.se (optional)
#
# Note: GITHUB_TOKEN is used automatically for GHCR login (no extra secret needed).
# One-time server setup required before first deploy — see docs/ServerSetup.md

name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/tschiffer46/azp2b:latest

      - name: Setup SSH
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          [ -n "$HETZNER_HOST" ] || { echo "Error: HETZNER_HOST secret is not set"; exit 1; }
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Update master docker-compose.yml on server
        run: |
          # Write the update script to a temp file (single-quoted heredoc keeps ${...} as literals)
          cat << 'PYEOF' > /tmp/update_compose.py
          import re

          COMPOSE_FILE = '/home/deploy/hosting/docker-compose.yml'

          NEW_AZP2B_BLOCK = (
              '  azp2b:\n'
              '    image: ghcr.io/tschiffer46/azp2b:latest\n'
              '    container_name: azp2b\n'
              '    restart: unless-stopped\n'
              '    env_file:\n'
              '      - .env.p2b\n'
              '    depends_on:\n'
              '      p2b-db:\n'
              '        condition: service_healthy\n'
              '    networks:\n'
              '      - web\n'
          )

          NEW_P2B_DB_BLOCK = (
              '  p2b-db:\n'
              '    image: mariadb:11\n'
              '    container_name: p2b-db\n'
              '    restart: unless-stopped\n'
              '    env_file:\n'
              '      - .env.p2b\n'
              '    environment:\n'
              '      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}\n'
              '      MYSQL_DATABASE: p2b\n'
              '      MYSQL_USER: p2b\n'
              '      MYSQL_PASSWORD: ${DB_PASSWORD}\n'
              '    volumes:\n'
              '      - p2b_db_data:/var/lib/mysql\n'
              '    healthcheck:\n'
              '      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]\n'
              '      interval: 10s\n'
              '      timeout: 5s\n'
              '      retries: 5\n'
              '    networks:\n'
              '      - web\n'
          )

          with open(COMPOSE_FILE) as f:
              content = f.read()

          # Replace the azp2b service block (everything from "  azp2b:" until
          # the next top-level 2-space-indented service key)
          content = re.sub(
              r'^  azp2b:\n(?:(?!  \S).*\n)*',
              NEW_AZP2B_BLOCK + '\n',
              content,
              flags=re.MULTILINE
          )

          # Add p2b-db service if not already present (use regex to avoid
          # matching "p2b-db:" inside the depends_on block of azp2b)
          if not re.search(r'^  p2b-db:', content, re.MULTILINE):
              content = content.replace(
                  NEW_AZP2B_BLOCK + '\n',
                  NEW_AZP2B_BLOCK + '\n' + NEW_P2B_DB_BLOCK + '\n'
              )

          # Add p2b_db_data named volume if not already present
          if 'p2b_db_data' not in content:
              if re.search(r'^volumes:', content, re.MULTILINE):
                  content = re.sub(
                      r'^(volumes:\n)',
                      r'\1  p2b_db_data:\n',
                      content,
                      flags=re.MULTILINE
                  )
              else:
                  content = content.rstrip('\n') + '\n\nvolumes:\n  p2b_db_data:\n'

          with open(COMPOSE_FILE, 'w') as f:
              f.write(content)

          print('docker-compose.yml updated successfully')
          PYEOF

          # Run the script on the server
          cat /tmp/update_compose.py | ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            python3

      - name: Write .env.p2b on server
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          {
            printf 'DATABASE_URL=mysql://p2b:%s@p2b-db:3306/p2b\n' "$DB_PASSWORD"
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
            printf 'DB_ROOT_PASSWORD=%s\n' "$DB_ROOT_PASSWORD"
            printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
            printf 'SMTP_HOST=%s\n' "$SMTP_HOST"
            printf 'SMTP_PORT=%s\n' "$SMTP_PORT"
            printf 'SMTP_USER=%s\n' "$SMTP_USER"
            printf 'SMTP_PASS=%s\n' "$SMTP_PASS"
            printf 'SMTP_FROM=%s\n' "$SMTP_FROM"
          } | ssh -i ~/.ssh/id_ed25519 \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
              'cat > /home/deploy/hosting/.env.p2b'

      - name: Pull updated images on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            'docker compose -f /home/deploy/hosting/docker-compose.yml pull azp2b p2b-db'

      - name: Start containers on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            'docker compose -f /home/deploy/hosting/docker-compose.yml up -d azp2b p2b-db'
